<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Dashboard | Arnold's Fitness</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700;800&amp;family=Manrope:wght@300;400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#e5e2e1",
                        "outline-variant": "#4d4635",
                        "on-primary-container": "#554300",
                        "surface-bright": "#3a3939",
                        "surface": "#131313",
                        "on-tertiary-fixed": "#00174b",
                        "error-container": "#93000a",
                        "inverse-primary": "#735c00",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-tertiary-fixed-variant": "#27438a",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary": "#082b72",
                        "tertiary-container": "#97b0ff",
                        "on-surface-variant": "#d0c5af",
                        "error": "#ffb4ab",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#574500",
                        "primary-fixed": "#ffe088",
                        "surface-container-lowest": "#0e0e0e",
                        "on-primary": "#3c2f00",
                        "on-secondary": "#313030",
                        "inverse-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "surface-tint": "#e9c349",
                        "primary-container": "#d4af37",
                        "outline": "#99907c",
                        "primary-fixed-dim": "#e9c349",
                        "tertiary-fixed-dim": "#b4c5ff",
                        "surface-variant": "#353534",
                        "secondary": "#c8c6c5",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary-fixed-variant": "#474646",
                        "on-primary-fixed": "#241a00",
                        "primary": "#f2ca50",
                        "secondary-container": "#4a4949",
                        "on-tertiary-container": "#254188",
                        "secondary-fixed": "#e5e2e1",
                        "background": "#131313",
                        "on-secondary-container": "#bab8b7",
                        "surface-container-highest": "#353534",
                        "on-error": "#690005",
                        "on-background": "#e5e2e1",
                        "surface-container": "#201f1f",
                        "tertiary": "#bfcdff",
                        "on-error-container": "#ffdad6"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        .gold-shimmer {
            background: linear-gradient(90deg, #f2ca50 0%, #d4af37 100%);
        }

        body {
            background-color: #131313;
        }
    </style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center p-6">

    <!-- Login Area -->
    <div id="login-screen" class="w-full max-w-md bg-surface-container-low p-8 border border-white/5 rounded-sm shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="font-headline text-3xl font-bold text-primary mb-2 uppercase tracking-tighter">Admin Access</h1>
            <p class="font-label text-[10px] uppercase tracking-[0.2rem] opacity-60">Identity verification required</p>
        </div>
        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label for="password" class="font-label text-[10px] uppercase tracking-[0.1rem] opacity-60">Master Password</label>
                <input type="password" id="password" required
                    class="w-full bg-surface border-none border-b-2 border-outline-variant focus:border-primary text-on-surface px-4 py-3 font-body transition-all outline-none focus:bg-surface-container-high"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full gold-shimmer text-on-primary py-4 rounded-sm font-label text-xs font-bold uppercase tracking-[0.2rem] shadow-xl active:scale-95 transition-all">
                Authorize
            </button>
            <p id="login-error" class="text-error text-[10px] uppercase tracking-widest text-center mt-4 hidden">Incorrect Password. Access Denied.</p>
        </form>
    </div>

    <!-- Dashboard Area (Hidden by default) -->
    <div id="dashboard-screen" class="hidden w-full max-w-6xl">
        <header class="flex justify-between items-end mb-12 border-b border-white/10 pb-8">
            <div>
                <span class="font-label text-primary text-[10px] font-bold uppercase tracking-[0.4rem]">The Monolith Standard</span>
                <h2 class="font-headline text-4xl font-bold mt-2 tracking-tight uppercase">Lead Management</h2>
            </div>
            <button id="logout-btn" class="font-label text-[10px] uppercase tracking-[0.2rem] text-on-surface-variant/60 hover:text-primary transition-colors flex items-center gap-2">
                Logout <span class="material-symbols-outlined text-sm">logout</span>
            </button>
        </header>

        <div class="bg-surface-container-low border border-white/5 overflow-hidden rounded-sm shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-surface-container-high border-b border-white/5">
                            <th class="px-6 py-4 font-headline text-xs font-bold uppercase tracking-widest text-primary">Name</th>
                            <th class="px-6 py-4 font-headline text-xs font-bold uppercase tracking-widest text-primary">Phone</th>
                            <th class="px-6 py-4 font-headline text-xs font-bold uppercase tracking-widest text-primary">Capture Date</th>
                            <th class="px-6 py-4 font-headline text-xs font-bold uppercase tracking-widest text-primary text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body" class="divide-y divide-white/5">
                        <!-- Leads will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="loading" class="p-12 text-center text-on-surface-variant/40 font-label text-xs uppercase tracking-widest">
                Fetching data from the sanctuary database...
            </div>
            <div id="no-leads" class="hidden p-12 text-center text-on-surface-variant/40 font-label text-xs uppercase tracking-widest">
                No leads recorded yet. Evolution is pending.
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const _supabaseUrl = 'https://jzifosnzeonsqzooorvu.supabase.co';
        const _supabaseKey = 'sb_publishable_wq6K9KvumfGqmrRtBOehOA_lZeeQmJr';
        const _supabase = supabase.createClient(_supabaseUrl, _supabaseKey);

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const leadsTableBody = document.getElementById('leads-table-body');
        const loadingIndicator = document.getElementById('loading');
        const noLeadsIndicator = document.getElementById('no-leads');

        const _m = 'YXJub2xkMTIz'; // Simple obfuscation

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            // Basic obfuscation: btoa() is Base64 encoding
            if (btoa(password) === _m) {
                showDashboard();
            } else {
                loginError.classList.remove('hidden');
                loginForm.reset();
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            window.location.reload();
        });

        function showDashboard() {
            loginScreen.classList.add('hidden');
            document.body.classList.remove('flex', 'items-center', 'justify-center');
            document.body.classList.add('block', 'p-6', 'md:p-12');
            dashboardScreen.classList.remove('hidden');
            fetchLeads();
        }

        async function fetchLeads() {
            try {
                // Fetch all columns without ordering first to avoid errors if created_at is missing
                const { data, error } = await _supabase
                    .from('leads')
                    .select('*');

                if (error) throw error;

                loadingIndicator.classList.add('hidden');
                
                if (data.length === 0) {
                    noLeadsIndicator.classList.remove('hidden');
                    return;
                }

                // Attempt to sort by created_at if it exists
                if (data[0] && data[0].hasOwnProperty('created_at')) {
                    data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                }

                leadsTableBody.innerHTML = '';
                data.forEach(lead => {
                    let dateStr = 'N/A';
                    if (lead.created_at) {
                        dateStr = new Date(lead.created_at).toLocaleDateString('en-IN', {
                            day: '2-digit',
                            month: 'short',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                    }
                    
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-white/5 transition-colors group';
                    row.innerHTML = `
                        <td class="px-6 py-4 font-body text-sm font-semibold">${lead.name}</td>
                        <td class="px-6 py-4 font-body text-sm text-on-surface-variant font-medium">${lead.phone}</td>
                        <td class="px-6 py-4 font-label text-[10px] uppercase tracking-widest opacity-60">${dateStr}</td>
                        <td class="px-6 py-4 text-right flex items-center justify-end gap-3">
                            <a href="https://wa.me/91${lead.phone}?text=Hi%20${encodeURIComponent(lead.name)},%20thanks%20for%20your%20interest%20in%20Arnold's%20Fitness" 
                               target="_blank" rel="noopener noreferrer"
                               class="inline-flex items-center gap-2 bg-[#25D366]/20 hover:bg-[#25D366] text-[#25D366] hover:text-white px-4 py-2 rounded-sm font-label text-[10px] font-bold uppercase tracking-widest transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884 0 2.225.569 3.847 1.706 5.461l-.957 3.498 3.734-.96z"/></svg>
                                Message
                            </a>
                            <button onclick="deleteLead('${lead.id}')" 
                               class="inline-flex items-center gap-2 bg-error-container/20 hover:bg-error-container text-error px-4 py-2 rounded-sm font-label text-[10px] font-bold uppercase tracking-widest transition-all">
                                <span class="material-symbols-outlined text-xs">delete</span>
                                Delete
                            </button>
                        </td>
                    `;
                    leadsTableBody.appendChild(row);
                });

            } catch (err) {
                console.error('Error fetching leads:', err);
                loadingIndicator.innerText = 'DATABASE SYNC ERROR. CONTACT ARCHITECT.';
            }
        }

        async function deleteLead(id) {
            if (!confirm('Are you sure you want to permanently delete this lead?')) return;
            
            try {
                const { error } = await _supabase
                    .from('leads')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                
                // Refresh table
                fetchLeads();
            } catch (err) {
                console.error('Error deleting lead:', err);
                alert('CRITICAL FAILURE: Could not delete lead.');
            }
        }
    </script>
</body>

</html>
